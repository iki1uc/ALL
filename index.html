<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>GEO‑MINI‑ANIMATION · ALL3E · iki1uc</title>
<style>
body { background:#000; color:#0f0; font-family:Consolas; padding:20px; }
pre { font-size:16px; line-height:18px; }
</style>
</head>
<body>

<h2>GEO‑MINI‑ANIMATION · ALL3E</h2>
<pre id="geo">START…</pre>

<script>
let f = 0;

function anim(){
    f++;

    const p = (n)=> (f % n ? "●" : "○");

    const geo = `
GEO‑SPACE (frame ${f})

X‑Axis  ─── ${p(2)}
Y‑Axis  ─── ${p(3)}
Z‑Axis  ─── ${p(4)}

H‑Axis  ─── ${p(5)}
B‑Axis  ─── ${p(6)}
T‑Axis  ─── ${p(7)}
M‑Axis  ─── ${p(8)}

ROTATION:
${" ".repeat(f%10)}↻

PULSE:
${"● ".repeat((f%6)+2)}

SHIFT:
${" ".repeat((f%5))}●──○──●
`;

    document.getElementById("geo").textContent = geo;

    requestAnimationFrame(anim);
}

anim();
</script>

</body>
</html>
