<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ALL · Hyperraum · Cube-Mind · Portal-Fusion</title>

<style>
body { background:#000; color:#0f0; font-family:monospace; padding:40px; }
h1 { color:#6cf; text-align:center; }

.box { background:#111; padding:20px; margin:20px 0; border-left:3px solid #6cf; }
.navItem { margin:4px; }
.navCell { display:inline-block; width:40px; text-align:center; }

.cube {
  width: 150px; height: 150px;
  position: relative; margin: 40px auto;
  transform-style: preserve-3d;
  animation: spin 3s infinite linear;
}
.face {
  position: absolute; width: 150px; height: 150px;
  background:#111; border:2px solid #6cf;
  text-align:center; padding-top:40px; font-size:14px;
}
.front  { transform: translateZ(75px); }
.back   { transform: rotateY(180deg) translateZ(75px); }
.left   { transform: rotateY(-90deg) translateZ(75px); }
.right  { transform: rotateY(90deg) translateZ(75px); }
.top    { transform: rotateX(90deg) translateZ(75px); }
.bottom { transform: rotateX(-90deg) translateZ(75px); }

@keyframes spin {
  from { transform: rotateY(0deg); }
  to   { transform: rotateY(360deg); }
}
</style>

<script src="ALL.core.js"></script>
<script src="ALL.geometry.js"></script>
<script src="ALL.portal.js"></script>
<script src="ALL.hyperraum.js"></script>
<script src="ALL.navigator.js"></script>
<script src="ALL.vectorcube.js"></script>
<script src="ALL.portalfusion.js"></script>

</head>

<body>

<h1>ALL · Hyperraum · Cube-Mind · Portal-Fusion</h1>

<div class="box" id="navigator"></div>
<div class="box" id="vectorcube"></div>
<div class="box" id="portalfusion"></div>

<script>
const respo = [
    "RESPO_CORE_ROUTER",
    "RESPO_UI_STATUS",
    "RESPO_MULTI_NORM",
    "RESPO_BEAM_POINT",
    "RESPO_ORT_LAGE",
    "RESPO_STATION",
    "RESPO_NAME",
    "RESPO_MODUL_LOOP",
    "RESPO_CODE_PIPELINE",
    "RESPO_POSITION_USER"
];

const hyper = ALL_HYPERRAUM.build(respo);

ALL_NAVIGATOR.render(hyper);
ALL_VECTORCUBE.animate(hyper.m27);
ALL_PORTALFUSION.render(hyper.m27);
</script>

</body>
</html>
