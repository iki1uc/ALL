<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>ALL · Master‑Sortierer · iki1uc · RESPO · HYPERRAUM · ORBIT · PIPELINE12 · PORTAL</title>

<style>
body { background:#000; color:#0f0; font-family:Consolas; padding:30px; }
h1 { color:#6cf; letter-spacing:3px; }
.block { background:#111; border:1px solid #333; padding:20px; margin:25px 0; border-radius:8px; }
.title { color:#6cf; font-size:20px; margin-bottom:10px; }
pre { background:#000; border-left:3px solid #6cf; padding:15px; white-space:pre-wrap; }
</style>

<script type="module">

// ------------------------------------------------------
// AUTO-SCAN: findet ALLE Dateien im ALL-Repo
// ------------------------------------------------------
async function scanRepo(){
    const api = "https://api.github.com/repos/iki1uc/ALL/contents/";
    const res = await fetch(api);
    const files = await res.json();
    return files.map(f => f.name);
}

// ------------------------------------------------------
// AUTO-LOAD: lädt jede Datei
// ------------------------------------------------------
async function loadFile(name){
    try{
        const res = await fetch(name);
        if(!res.ok) return { name, ok:false };
        const txt = await res.text();
        return { name, ok:true, content:txt };
    }catch(e){
        return { name, ok:false };
    }
}

// ------------------------------------------------------
// START: lädt ALT + NEU + ALL + RESPO + HYPERRAUM + ORBIT + PIPELINE12
// ------------------------------------------------------
async function start(){
    const out = document.getElementById("sys");

    const repoFiles = await scanRepo();
    const loaded = [];

    for(const f of repoFiles){
        loaded.push(await loadFile(f));
    }

    out.innerText = JSON.stringify({
        SYSTEM: "ALL · Master‑Sortierer · iki1uc",
        MODULES: {
            CORE: "ALL.core.js",
            CUBE: "ALL.cube.js",
            GEOMETRY: "ALL.geometry.js",
            HYPERRAUM: "ALL.hyperraum.js",
            NAVIGATOR: "ALL.navigator.js",
            ORBIT: "ALL.orbit.js",
            PIPELINE12: "ALL.pipeline12.js",
            PORTAL: "ALL.portal.js",
            PORTALFUSION: "ALL.portalfusion.js",
            ULTRA: "ALL.ultra.js",
            VECTORCUBE: "ALL.vectorcube.js"
        },
        FILES: loaded,
        STATUS: "AKTIV",
        READY: "100%"
    }, null, 2);
}

start();

</script>
</head>

<body>

<h1>ALL · Master‑Sortierer · iki1uc</h1>

<div class="block">
    <div class="title">System‑Status</div>
    <pre id="sys">Lade…</pre>
</div>

</body>
</html>
