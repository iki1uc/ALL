// ORBIT ASCII
function orbit(){
let a = Math.floor(Math.random()*360);
return `

Path : ●──○──●──○──●
`;
}

// VECTORCUBE ASCII

return `

+-------+
| ●   ● |
|   ●   |
| ●   ● |

`;
